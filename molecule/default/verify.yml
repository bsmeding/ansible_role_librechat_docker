---
- name: Verify LibreChat Docker role
  hosts: all
  become: true
  vars:
    molecule_librechat_home: "/tmp/molecule-librechat-{{ lookup('env', 'MOLECULE_DISTRO') | default('default', true) }}"
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Set molecule testing vars
      ansible.builtin.set_fact:
        librechat__home: "{{ molecule_librechat_home }}"
        librechat__port: 3080
        librechat__name: librechat

    - name: Check docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ librechat__home }}/docker-compose.yml"
      register: compose_file

    - name: Ensure docker-compose.yml exists
      ansible.builtin.assert:
        that: compose_file.stat.exists
        fail_msg: "docker-compose.yml not found at {{ librechat__home }}"

    - name: Check LibreChat API container is running
      community.docker.docker_container_info:
        name: LibreChat
      register: librechat_container
      retries: 60
      delay: 10
      until: librechat_container.exists | default(false) and librechat_container.container.State.Running | default(false)
      failed_when: false
      changed_when: false

    - name: Gather LibreChat logs when container is not running
      ansible.builtin.command: docker logs --tail 200 LibreChat
      register: librechat_container_logs
      changed_when: false
      failed_when: false
      when: not (librechat_container.exists | default(false) and librechat_container.container.State.Running | default(false))

    - name: Assert LibreChat container is running
      ansible.builtin.assert:
        that:
          - librechat_container.exists | default(false)
          - librechat_container.container.State.Running | default(false)
        fail_msg: >-
          LibreChat container is not running.
          State={{ librechat_container.container.State.Status | default('missing') }}.
          Recent logs:
          {{ (librechat_container_logs.stdout | default('No logs available'))[:4000] }}

    # Do not probe the published host port from the runner: Docker can accept TCP on
    # localhost:3080 then reset HTTP (hairpin / proxy quirks). Hit the API from inside
    # the LibreChat container instead (same network namespace as the Node process).
    - name: Check LibreChat serves HTTP (inside API container)
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - LibreChat
          - node
          - -e
          - >-
            const req = require('http').get(
            'http://127.0.0.1:{{ librechat__port }}/',
            (r) => { r.resume(); process.exit([200, 301, 302, 304].includes(r.statusCode) ? 0 : 1); }
            );
            req.on('error', () => process.exit(1));
            req.setTimeout(15000, () => { req.destroy(); process.exit(1); });
      register: librechat_http
      changed_when: false
      retries: 40
      delay: 5
      until: librechat_http.rc == 0
