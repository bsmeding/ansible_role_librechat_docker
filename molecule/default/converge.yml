---
# Role root = two levels above this file (molecule/default -> repo root).
# import_role avoids Galaxy name resolution and works with `ansible-playbook --syntax-check` in CI.
- name: Converge
  hosts: all

  vars:
    molecule_librechat_home: "/tmp/molecule-librechat-{{ lookup('env', 'MOLECULE_DISTRO') | default('default', true) }}"
    librechat__home: "{{ molecule_librechat_home }}"
    librechat__port: 3080
    librechat__meili_master_key: "molecule-test-meili-master-key-32chars"
    # Compose still pulls missing images (pull: missing); set true to force re-pull every run
    librechat__pull_images: false
    # Must be false: idempotence runs converge twice; true would remove /opt/librechat every time
    librechat__remove_existing_home_dir: false

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts.os_family == 'Debian'
      changed_when: false

  tasks:
    # Docker daemon: host socket mounted in molecule.yml.
    - name: Apply librechat_docker role under test
      ansible.builtin.import_role:
        name: "{{ playbook_dir | dirname | dirname }}"
